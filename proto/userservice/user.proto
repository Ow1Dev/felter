syntax = "proto3";
package userservice;

option go_package = "github.com/Ow1Dev/felter/internal/userservice/pb";

service UserService {
  rpc CreateUser(CreateUserRequest) returns (User);
  rpc GetUser(GetUserRequest) returns (User);
  rpc GetUserFromProvider(GetUserFromProviderRequest) returns (User);
  rpc CreateUserFromProvider(CreateUserFromProviderRequest) returns (User);
}

message User {
  int64  id           = 1;
  string email        = 2;
  string username     = 3;
  string display_name = 4;
  string created_at   = 5; // RFC3339
}

message CreateUserRequest {
  string email        = 1;
  string username     = 2;
  string display_name = 3;
}

message GetUserRequest {
  int64 id = 1;
}

message GetUserFromProviderRequest {
  string provider    = 1;
  string provider_id = 2;
}

message CreateUserFromProviderRequest {
  string provider    = 1;
  string provider_id = 2;
  string email       = 3;
  string username    = 4;
}

message ListUsersRequest {}

message ListUsersResponse {
  repeated User users = 1;
}
