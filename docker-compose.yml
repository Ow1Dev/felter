services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: felter
      POSTGRES_PASSWORD: felter
      POSTGRES_DB: felter
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U felter"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
    volumes:
      - keycloak_data:/opt/keycloak/data
    ports:
      - "8180:8080"

volumes:
  postgres_data:
  keycloak_data:
