process-compose-file-version: 2
name: felter

processes:
  fieldservice:
    command: go run ./cmd/fieldservice
    env:
      - DATABASE_DSN
      - PORT=8080
    restart: manual

  userservice:
    command: go run ./cmd/userservice
    env:
      - DATABASE_DSN
      - GRPC_ADDRESS=:9091
      - HTTP_ADDRESS=:9090
    restart: manual

  proxy:
    command: go run ./cmd/proxy
    env:
      - PROXY_HTTP_ADDRESS=:9092
      - PROXY_JWT_SECRET
      - PROXY_KEYCLOAK_URL=http://localhost:8180
      - PROXY_KEYCLOAK_REALM=felter
      - PROXY_KEYCLOAK_CLIENT_ID=felter
      - PROXY_KEYCLOAK_CLIENT_SECRET
      - PROXY_KEYCLOAK_REDIRECT_URI=http://localhost:4200/callback
      - PROXY_USERSERVICE_GRPC_ADDR=:9091
      - PROXY_FIELD_URL=http://localhost:8080
      - PROXY_USERSERVICE_URL=http://localhost:9090
      - PROXY_PROJECTSERVICE_URL=http://localhost:8081
    restart: manual

  projectservice:
    command: go run ./cmd/projectservice
    env:
      - DATABASE_DSN
      - PORT=8081
    restart: manual

  web:
    command: cd web && bun start
    restart: manual
